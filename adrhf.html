<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aslbek Smart AI</title>
    <style>
        /* CSS - Zamonaviy To'q Dizayn */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 95%;
            max-width: 500px;
            height: 85vh;
            background: #1e293b;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            overflow: hidden;
        }

        .header {
            background: #3b82f6;
            padding: 20px;
            text-align: center;
        }

        .header h2 { margin: 0; font-size: 20px; text-transform: uppercase; }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #0f172a;
        }

        .msg {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 85%;
            font-size: 15px;
            line-height: 1.5;
        }

        .ai { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-area {
            padding: 20px;
            background: #1e293b;
            display: flex;
            gap: 10px;
            border-top: 1px solid #334155;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            border-radius: 10px;
            outline: none;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header"><h2>Aslbek Smart AI</h2></div>
        <div id="messages">
            <div class="msg ai">Salom! Men matnli matematikani ham tushunaman. Masalan: "uchga ikkini qo'sh" deb yozib ko'ring!</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Savol bering..." onkeypress="if(event.key==='Enter') startAI()">
            <button onclick="startAI()">Yuborish</button>
        </div>
    </div>

    <script>
        // O'zbekcha
